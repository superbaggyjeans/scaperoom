<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mundos Cruzados</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
color:white;
}

/* 🖼️ FONDO CON IMAGEN */
.background{
position:fixed;
width:100%;
height:100%;
background-image: url("TU_IMAGEN_AQUI.jpg"); /* 🔥 CAMBIA ESTO */
background-size: cover;
background-position: center;
filter: brightness(0.3); /* oscuro estilo terror */
z-index:-2;
}

/* OVERLAY */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* 💀 LOADING */
.loading-screen{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

/* TEXTO GLITCH */
.loading-text{
font-size:2rem;
margin-bottom:20px;
animation: glitch 0.3s infinite;
}

@keyframes glitch{
0%{transform:translate(0);}
25%{transform:translate(2px,-2px);}
50%{transform:translate(-2px,2px);}
75%{transform:translate(2px,2px);}
100%{transform:translate(0);}
}

/* BARRA */
.loading-bar-container{
width:60%;
height:25px;
border:2px solid red;
overflow:hidden;
background:#111;
}

.loading-bar{
height:100%;
width:0%;
background:linear-gradient(90deg, rgb(255, 0, 0), rgb(255, 0, 0), rgb(255, 0, 0));
animation:load 5s linear forwards;
}

@keyframes load{
0%{width:0%;}
100%{width:100%;}
}

/* TEXTO CAMBIANTE */
.loading-sub{
margin-top:15px;
font-size:1rem;
color:#ccc;
}

/* FLASH */
.flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

/* CARD */
.card{
opacity:0;
transform:scale(0.8);
transition:1s;
text-align:center;
padding:40px;
}

.card.visible{
opacity:1;
transform:scale(1);
}

/* BOTON */
.start-btn{
padding:15px 40px;
font-size:1.2rem;
background:yellow;
border:none;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<!-- 🖼️ FONDO -->
<div class="background"></div>
<div class="overlay"></div>

<!-- LOADING -->
<div class="loading-screen" id="loading">

<div class="loading-text">Cargando...</div>

<div class="loading-bar-container">
<div class="loading-bar"></div>
</div>

<div class="loading-sub" id="subtexto">
Inicializando mundos...
</div>

</div>

<!-- FLASH -->
<div class="flash" id="flash"></div>

<!-- MAIN -->
<div class="card" id="main">

<h1>Mundos Cruzados</h1>
<p> Un juego absurdo y mal hecho a proposito
con el objetivo de dar risa por lo simple y malo que es.
Un juego donde tendrás que ayudar a personajes icónicos de Cartoon network
</p>

<button class="start-btn" onclick="ir()">
EMPEZAR
</button>

</div>

<script>

// FRASES
const frases = [
"Cargando texturas inexistentes...",
"Invocando a Clarence...",
"Rigby robando código...",
"Gumball rompiendo la realidad...",
"Slenderman bailando...",
"Error 404: sentido no encontrado"
];

let i = 0;

setInterval(()=>{
document.getElementById("subtexto").innerText = frases[i % frases.length];
i++;
},1500);


// FINAL LOADING
window.onload = () => {

setTimeout(()=>{

// FLASH
const flash = document.getElementById("flash");
flash.style.opacity = 1;

setTimeout(()=>{
flash.style.opacity = 0;
},200);

// MOSTRAR MENU
document.getElementById("loading").style.display="none";
document.getElementById("main").classList.add("visible");

},5000);

}

function ir(){
window.location.href="Clarence.html";
}

</script>

</body>
</html>
