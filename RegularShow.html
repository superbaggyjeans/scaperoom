<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mundo Mordecai y Rigby</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

#uiMensaje{
  position:absolute;
  bottom:30px;
  width:100%;
  text-align:center;
  font-family:Arial;
  font-size:18px;
  color:white;
  text-shadow:2px 2px 4px black;
  z-index:9999;
}
</style>
</head>

<body>

<div id="uiMensaje"></div>

<a-scene>

  <!-- CIELO TENEBROSO -->
  <a-sky color="#0b0f19"></a-sky>

  <!-- LUZ -->
  <a-light type="ambient" intensity="0.4"></a-light>
  <a-light type="directional" position="0 10 -5" intensity="0.6"></a-light>

  <!-- CÁMARA -->
  <a-entity id="camara"
  camera
  look-controls
  wasd-controls="acceleration:6.5"
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable"
  position="-18.078 0.717 -33.910"
  rotation="0 -96.355 0">

    <a-cursor></a-cursor>
  </a-entity>

  <!-- SUELO -->
  <a-plane rotation="-90 0 0" width="100" height="100" color="#1a1a1a"></a-plane>

  <!-- BOSQUE -->
  <a-entity gltf-model="modelos 3d scaperoom/horror_house_scene_nature_tree_and_environment.glb"
            position="0 0 0"
            scale="2 2 2">
  </a-entity>

  <!-- MORDECAI -->
  <a-entity id="mordecai"
            class="clickable"
            gltf-model="modelos 3d scaperoom/mordecai_fusionfall_heroes.glb"
            position="-11.70791 0.02062 -32.18633"
            rotation="1.0559 -108.476 -1.79"
            scale="0.26782 0.26106 0.22086">
  </a-entity>

  <!-- RIGBY -->
  <a-entity id="rigby"
            class="clickable"
            gltf-model="modelos 3d scaperoom/rigby_3d.glb"
            position="-5.77872 0.48316 -31.93874"
            rotation="0 -111 0"
            scale="0.17673 0.17673 0.17673">
  </a-entity>

  <!-- SLENDERMAN -->
  <a-entity id="slenderman"
            class="clickable"
            gltf-model="modelos 3d scaperoom/slender_fortress_old_slenderman_rig.glb"
            position="0.43983 -0.02471 -43.58557"
            rotation="0 -56.346 0"
            scale="0.59726 0.59726 0.59726"
            visible="false">
  </a-entity>

  <!-- CASSETTE -->
  <a-entity id="cassette"
            class="clickable"
            gltf-model="modelos 3d scaperoom/music_cassette.glb"
            position="0.537 0.060 -42.955"
            scale="2.655 8.599 8.469"
            visible="false">
  </a-entity>

  <!-- PORTAL -->
  <a-entity id="portal"
            class="clickable"
            gltf-model="modelos 3d scaperoom/green_portal.glb"
            position="-14.378 3.211 -30.462"
            rotation="-89.186 1.199 -8.979"
            scale="8.968 10.261 13.971"
            visible="false">
  </a-entity>

</a-scene>

<script>

let estado = "inicio";
let tengoCassette = false;

const mensajeUI = document.getElementById("uiMensaje");

function mostrarMensaje(texto){
  mensajeUI.innerText = texto;
  setTimeout(() => mensajeUI.innerText = "", 5000);
}

window.onload = () => {

const mordecai = document.querySelector("#mordecai");
const rigby = document.querySelector("#rigby");
const slenderman = document.querySelector("#slenderman");
const cassette = document.querySelector("#cassette");
const portal = document.querySelector("#portal");

// OBJETIVO INICIAL
mostrarMensaje("Objetivo: Habla con Mordecai");


// MORDECAI
mordecai.addEventListener("click", () => {

  if(estado === "inicio"){

    mostrarMensaje("Mordecai: Bro... Rigby tenía mi mixtape ochentero. Ve a preguntarle.");

    setTimeout(() => {
      mostrarMensaje("Objetivo: Entra dentro y habla con Rigby");
    }, 4000);

    estado = "hablarRigby";
  }

  else if(estado === "volverMordecai" && tengoCassette){

    mostrarMensaje("Mordecai: ¡¡¡MI MIXTAPE!!! 😭🔥 Eres un héroe bro. Toma esta llave.");

    portal.setAttribute("visible", true);
    estado = "portal";
  }

});


// RIGBY
rigby.addEventListener("click", () => {

  if(estado === "hablarRigby"){

    mostrarMensaje(
      "Rigby: BROOO 😭 Yo lo tenía...\n" +
      "Pero se lo di a un tipo muy largo...\n" +
      "Blanco...\nPelado...\nCon tentáculos...\n\n" +
      "Creo que sigue en el bosque 💀"
    );

    slenderman.setAttribute("visible", true);

    setTimeout(() => {
      mostrarMensaje("Objetivo: Busca al tipo largo, calvo y blanco");
    }, 5000);

    estado = "buscarSlenderman";
  }

});


// SLENDERMAN
slenderman.addEventListener("click", () => {

  if(estado === "buscarSlenderman"){

    mostrarMensaje("Slenderman: ........\n\n(tira el cassette al suelo)\n\n*empieza a bailar inquietantemente*");

    cassette.setAttribute("visible", true);
    tengoCassette = true;
    estado = "volverMordecai";

    // BAILE CREEPY
    slenderman.setAttribute("animation__giro",
      "property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear");

    slenderman.setAttribute("animation__salto",
      "property: position; dir: alternate; dur: 500; loop: true; to: 0 2 -25");
  }

});


// RECOGER CASSETTE
cassette.addEventListener("click", () => {

  if(tengoCassette){

    cassette.setAttribute("visible", false);

    mostrarMensaje("Has recogido el mixtape. Devuélveselo al pajarraco azul.");
  }

});


// PORTAL
portal.addEventListener("click", () => {

  if(estado === "portal"){
    window.location.href = "mundo3.html";
  }

});

}

</script>

</body>
</html>
