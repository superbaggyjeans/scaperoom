<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mundo Mordecai y Rigby</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

#uiMensaje{
    position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  padding:15px;
  text-align:center;
  font-family:Courier New;
  font-size:18px;
  color:#eaeaea;
  background:rgba(0,0,0,0.75);
  border:2px solid rgb(0, 0, 0);
  border-radius:10px;
  box-shadow:0 0 15px rgb(0, 0, 0);
  z-index:9999;
}
</style>
</head>

<body>

<div id="uiMensaje"></div>

<a-scene>

  <!-- CIELO -->
  <a-sky color="#0b0f19"></a-sky>

  <!-- LUCES -->
  <a-light type="ambient" intensity="0.4"></a-light>
  <a-light type="directional" position="0 10 -5" intensity="0.6"></a-light>

  <!-- CÁMARA -->
  <a-entity id="camara"
    camera
    look-controls
    wasd-controls="acceleration:6.5"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable"
    position="-18.078 0.717 -33.910"
    rotation="0 -96.355 0">
    <a-cursor></a-cursor>
  </a-entity>

  <!-- SUELO -->
  <a-plane rotation="-90 0 0" position="0 -1.185 0" width="100" height="100" color="#1a1a1a"></a-plane>

  <!-- BOSQUE -->
  <a-entity gltf-model="modelos 3d scaperoom/horror_house_scene_nature_tree_and_environment.glb"
    position="0 0 0"
    scale="2 2 2">
  </a-entity>

  <!-- MORDECAI -->
  <a-entity id="mordecai"
    class="clickable"
    gltf-model="modelos 3d scaperoom/mordecai_fusionfall_heroes.glb"
    position="-11.70791 0.02062 -32.18633"
    rotation="1.0559 -108.476 -1.79"
    scale="0.26782 0.26106 0.22086">
  </a-entity>

  <!-- RIGBY -->
  <a-entity id="rigby"
    class="clickable"
    gltf-model="modelos 3d scaperoom/rigby_3d.glb"
    position="-5.77872 0.48316 -31.93874"
    rotation="0 -111 0"
    scale="0.17673 0.17673 0.17673">
  </a-entity>

  <!-- SLENDERMAN -->
  <a-entity id="slenderman"
    gltf-model="modelos 3d scaperoom/Hip Hop Dancing.glb"
    animation-mixer="clip:*"
    position="0.991 0.057 -43.438"
    rotation="0 -56.346 0"
    scale="100 100 100"
    visible="false">
  </a-entity>

  <!-- HITBOX DE SLENDERMAN XDDD-->
  <a-box id="slendermanHit" 
    class="clickable"
    position="0.991 5 -43.438"
    scale="5 10 5"
    color="red"
    opacity="0"
    visible="false">
  </a-box>

  <!-- CASSETTE -->
  <a-entity id="cassette"
    class="clickable"
    gltf-model="modelos 3d scaperoom/music_cassette.glb"
    position="0.537 0.060 -42.955"
    scale="2.655 8.599 8.469"
    visible="false">
  </a-entity>

  <!-- PORTAL -->
  <a-entity id="portal"
    class="clickable"
    gltf-model="modelos 3d scaperoom/green_portal.glb"
    position="-14.378 3.211 -30.462"
    rotation="-89.186 1.199 -8.979"
    scale="8.968 10.261 13.971"
    visible="false">
  </a-entity>

</a-scene>

<script>

let estado = "inicio";
let tengoCassette = false;

const mensajeUI = document.getElementById("uiMensaje");

function mostrarMensaje(texto){
  mensajeUI.innerText = texto;
  setTimeout(()=>{ mensajeUI.innerText=""; },5000);
}

window.onload = () => {

const mordecai = document.querySelector("#mordecai");
const rigby = document.querySelector("#rigby");
const slenderman = document.querySelector("#slenderman");
const slendermanHit = document.querySelector("#slendermanHit");
const cassette = document.querySelector("#cassette");
const portal = document.querySelector("#portal");


// OBJETIVO INICIAL
mostrarMensaje("Objetivo: Habla con Mordo");


// MORDECAI
mordecai.addEventListener("click", () => {

  if(estado === "inicio"){
    mostrarMensaje("Mordecai: Bro... Rigby tenía mi mixtape ochentero y lo necesito. Ve a preguntale que me lo devuelva >:v.");

    setTimeout(()=>{
      mostrarMensaje("Objetivo: Entra dentro de la casa y habla con Rigby");
    },6000);

    estado = "hablarRigby";
  }

  else if(estado === "volverMordecai" && tengoCassette){
    mostrarMensaje("Mordecai: MI MIXTAPE!!! 😭🔥 eres un crack hermano. te abro el portal chavalin.");
    portal.setAttribute("visible",true);
    estado="portal";
  }

});


// RIGBY
rigby.addEventListener("click",()=>{

  if(estado==="hablarRigby"){

    mostrarMensaje(
      "Rigby: EL MIXTAPE DE MORDO? BROOO 😭 Yo lo tenía... Pero se lo di a un tipo\n"+
      "Muy largo...\n"+
      "Blanco...\nCALVO...\n y con tentáculos...\n\n"+
      "Creo que sigue en el bosque 💀"
    );

    slenderman.setAttribute("visible",true);
    slendermanHit.setAttribute("visible",true);

    setTimeout(()=>{
      mostrarMensaje("Objetivo: se me ha olvidado el objetivo :'v");
    },5000);

    estado="buscarSlenderman";
  }

});


// SLENDERMAN (ARREGLADO)
slendermanHit.addEventListener("click",()=>{

  console.log("CLICK SLENDERMAN");

  if(estado==="buscarSlenderman"){

    mostrarMensaje("SLENDERMAN: ........\n\n*tira el cassette al suelo*\n\n*empieza a bailar :v*");

    cassette.setAttribute("visible",true);

    tengoCassette=true;
    estado="volverMordecai";

    slendermanHit.setAttribute("visible",false);
  }

});


// CASSETTE
cassette.addEventListener("click",()=>{

  if(tengoCassette){
    cassette.setAttribute("visible",false);
    mostrarMensaje("Has recogido el mixtape. Devuélveselo al pajarraco azul.");
  }

});

////
// 🌀 PORTAL
portal.addEventListener("click", () => {

  if(estado === "portal"){
    window.location.href = "El asombroso mundo de gumball.html";
  }

});

}

</script>

</body>
</html>
