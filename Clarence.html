<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mundo Clarence</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }

#ui {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  display: none;
  z-index: 9999;
}

#respuesta {
  padding: 10px;
  font-size: 16px;
  width: 250px;
}

#btnResponder {
  padding: 10px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="ui">
 <input type="text" id="respuesta" placeholder="Escribe tu respuesta aquí">
 <button id="btnResponder">Responder</button>
</div>

<a-scene>

  <!-- 🔥 BACKGROUND -->
  <a-assets>
    <img id="fondo" src="modelos 3d scaperoom/bluesky.sp.png">
  </a-assets>

  <a-sky src="#fondo" rotation="0 -90 0"></a-sky>

  <!-- Cámara -->
  <a-entity id="camara"
           camera
           look-controls
           wasd-controls="acceleration: 10"
           cursor="rayOrigin: mouse"
           position="2.918 0.820 5.603">
    <a-cursor></a-cursor>
  </a-entity>

  <!-- Mundo -->
  <a-entity gltf-model="modelos 3d scaperoom/lowpoly_stylized_ghetto_city_pack.glb"
            position="0 0 0"
            scale="1.891 3.458 1.888">
  </a-entity>

  <!-- 💀 CLARENCE GIRANDO COMO POSEIDO -->
  <a-entity id="clarence"
            gltf-model="clarence_hip_hop_dancing.glb"
            position="1.801 -0.014 0.692"
            scale="0.397 0.417 0.379"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
  </a-entity>

  <!-- Pizza -->
  <a-entity id="pizza"
            gltf-model="modelos 3d scaperoom/slice_of_pizza.glb"
            position="-0.479 -0.034 0.223"
            scale="10.326 10.326 10.326"
            visible="false">
  </a-entity>

  <!-- Llave -->
  <a-entity id="llave"
            gltf-model="modelos 3d scaperoom/flint_and_steel_minecraft.glb"
            position="1.902 0.017 0.310"
            scale="0.409 0.409 0.356"
            visible="false">
  </a-entity>

  <!-- Portal -->
  <a-entity id="portal"
            gltf-model="modelos 3d scaperoom/nether_portal.glb"
            position="3.353 -0.342 -4.467"
            scale="0.213 0.213 0.213"
            visible="false">
  </a-entity>

  <!-- Texto -->
  <a-text id="dialogo"
          position="2.459 1.110 -0.030"
          rotation="0 40.126 0"
          scale="0.425 0.477 0.174"
          align="center"
          width="6"
          color="yellow"
          visible="false">
  </a-text>

</a-scene>

<script>
let estado = "inicio";

window.onload = () => {

 const clarence = document.querySelector("#clarence");
 const pizza = document.querySelector("#pizza");
 const llave = document.querySelector("#llave");
 const portal = document.querySelector("#portal");
 const dialogo = document.querySelector("#dialogo");

 const ui = document.getElementById("ui");
 const respuestaInput = document.getElementById("respuesta");
 const btnResponder = document.getElementById("btnResponder");

 // Clarence
 clarence.addEventListener("click", () => {

   if (estado === "inicio") {
     dialogo.setAttribute("value",
       "Oda kompañero jiji \nTengo ambre...\nvúscame una piptzaa jiji");
     dialogo.setAttribute("visible", true);
     pizza.setAttribute("visible", true);
     estado = "buscandoPizza";
   }

   else if (estado === "entregoPizza") {
     dialogo.setAttribute("value",
       "Grashias amiko jiji \n¿Mis mejores amigos?");
     
     ui.style.display = "block";
     respuestaInput.focus();
     estado = "pregunta";
   }
 });

 // Pizza
 pizza.addEventListener("click", () => {
   if (estado === "buscandoPizza") {
     pizza.setAttribute("visible", false);
     dialogo.setAttribute("value",
       "🍕 Llévasela a Clarence");
     estado = "entregoPizza";
   }
 });

 // Respuesta
 btnResponder.addEventListener("click", () => {

   let respuesta = respuestaInput.value.toLowerCase();

   if (estado === "pregunta") {

     if (respuesta.includes("jeff") && respuesta.includes("sumo")) {

       dialogo.setAttribute("value",
         "Corrrrectooooo 😈\nToma eta yave");

       ui.style.display = "none";
       llave.setAttribute("visible", true);
       estado = "llave";

     } else {
       dialogo.setAttribute("value",
         "Erroneo. veo que tu iq es bastante mediocre. que lastima pero te dare una pista \nUno con cara cuadrada y otro calvo...");
     }
   }
 });

 // Llave
 llave.addEventListener("click", () => {
   if (estado === "llave") {
     llave.setAttribute("visible", false);
     dialogo.setAttribute("value",
       "Portal abierto 🌀");
     portal.setAttribute("visible", true);
     estado = "portal";
   }
 });

 // Portal
 portal.addEventListener("click", () => {
   if (estado === "portal") {
     window.location.href = "Coraje.html";
   }
 });

};
</script>

</body>
</html>
