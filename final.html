<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mundos Cruzados - Final Absurdo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-end; /* Empuja la card hacia abajo */
    color:white;
    background:black;
    padding-bottom:80px; /* espacio extra desde abajo */
    overflow:hidden;
}

/* 🖼️ FONDO ANIMADO LIGERO */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background-image: url("modelos 3d scaperoom/67personajes.png");
    background-size: cover;
    background-position: center;
    filter: brightness(0.2) contrast(1.2);
    animation: fondoLoco 10s infinite alternate;
    z-index:-2;
}

@keyframes fondoLoco{
    0%{filter: brightness(0.2) contrast(1);}
    50%{filter: brightness(0.35) contrast(1.5) hue-rotate(45deg);}
    100%{filter: brightness(0.2) contrast(1);}
}

/* OVERLAY */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

/* CARD FINAL */
.card{
    text-align:center;
    padding:40px;
    max-width:700px;
    background:rgba(0,0,0,0.5);
    border:3px dashed yellow;
    opacity:0;
    animation: cardAparece 2s forwards;
}

@keyframes cardAparece{
    0%{opacity:0; transform:scale(0.5) rotate(-10deg);}
    100%{opacity:1; transform:scale(1) rotate(0deg);}
}

/* TÍTULO DIVERTIDO */
h1{
    font-size:3rem;
    color:#ff0;
    animation: tituloGlitch 1s infinite;
}

@keyframes tituloGlitch{
    0%,100%{text-shadow: 2px 2px red, -2px -2px cyan;}
    50%{text-shadow: -2px 2px lime, 2px -2px magenta;}
}

/* TEXTO FINAL */
p{
    font-size:1.2rem;
    margin-top:20px;
    line-height:1.5;
    color:#fff;
    animation: textoBounce 2s infinite alternate;
}

@keyframes textoBounce{
    0%{transform:translateY(0);}
    100%{transform:translateY(-10px);}
}

/* BOTÓN FINAL LOCO */
.start-btn{
    padding:15px 40px;
    font-size:1.2rem;
    background:yellow;
    border:none;
    cursor:pointer;
    margin-top:30px;
    animation: btnPulse 1s infinite alternate;
}

@keyframes btnPulse{
    0%{transform:scale(1);}
    100%{transform:scale(1.2);}
}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- MAIN CARD -->
<div class="card" id="main">
    <h1>¡GRACIAS POR JUGAR!</h1>
    <p>
        mierdon de juego pero espero te haya gustado (a nosotros no)
    </p>
    <button class="start-btn" onclick="ir()">Jugar de Nuevo (?)</button>
</div>

<script>
function ir(){
    alert("¡Prepárate para más absurdos!");
    window.location.href="Clarence.html";
}
</script>

</body>
</html>
