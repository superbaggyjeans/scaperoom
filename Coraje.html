<html>
<head>
<meta charset="utf-8">
<title>Mundo Coraje</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
#ui { position:absolute; bottom:20px; width:100%; text-align:center; display:none; z-index:9999; }
#respuesta { padding:10px; font-size:16px; width:250px; }
#btnResponder { padding:10px; font-size:16px; cursor:pointer; }
</style>
</head>

<body>

<div id="ui">
  <input id="respuesta" type="text" placeholder="Escribe tu respuesta aquí">
  <button id="btnResponder">Responder</button>
</div>

<a-scene renderer="physicallyCorrectLights:true; colorManagement:true" shadow="type:pcfsoft">

  <!-- Luces y fondo -->
  <a-entity light="type:ambient; intensity:2.5"></a-entity>
  <a-entity light="type:hemisphere; intensity:3"></a-entity>
  <a-entity light="type:directional; intensity:4; castShadow:true" position="10 20 10"></a-entity>
  <a-sky color="#cfe8ff"></a-sky>

  <!-- Cámara -->
  <a-entity id="camara" camera look-controls wasd-controls="acceleration:17" cursor="rayOrigin:mouse" position="12.432 2.445 12.040">
    <a-cursor></a-cursor>
  </a-entity>

  <!-- Modelos -->
  <a-entity gltf-model="modelos 3d scaperoom/courage_the_cowardly_dog_house(1).glb" position="0 -1 0" scale="2 2 2"></a-entity>
  <a-entity id="personaje" gltf-model="modelos 3d scaperoom/eustace_bagge(2).glb" position="4.04143 1.27685 3.56224" scale="0.239 0.239 0.239"></a-entity>
  <a-entity id="coraje" gltf-model="modelos 3d scaperoom/courage_the_cowardly_dog-simple_design_low_poly.glb" position="-8.808 0.7 6.51374" scale="0.5 0.5 0.5" rotation="0 84 0"></a-entity>

  <!-- Objetos interactivos -->
  <a-entity id="llave" gltf-model="modelos 3d scaperoom/dice_20.glb" position="4.068 1.454 4.369" scale="0.590 0.590 0.590" visible="false"></a-entity>
  <a-entity id="portal" gltf-model="modelos 3d scaperoom/stranger_things_portal(1).glb" position="8.573 2.298 2.470" scale="1.557 1.557 1.557" visible="false"></a-entity>

  <!-- Textos -->
  <a-text id="dialogo" position="0 3 -1" align="center" width="6" color="red" look-at="#camara" visible="false"></a-text>
  <a-text id="textoCoraje" align="center" width="6" value="¡Nooooo, coraje ha huido, encuentralo!" look-at="#camara" visible="false"></a-text>

</a-scene>

<script>
let estado = "inicio";
let corajeCorre = false;

window.onload = () => {
  const personaje = document.querySelector("#personaje");
  const coraje = document.querySelector("#coraje");
  const llave = document.querySelector("#llave");
  const portal = document.querySelector("#portal");
  const dialogo = document.querySelector("#dialogo");
  const textoCoraje = document.querySelector("#textoCoraje");

  // Click en Eustace
  personaje.addEventListener("click", () => {
    const pos = personaje.getAttribute("position");

    if (estado === "inicio") {
      dialogo.setAttribute("position", `${pos.x} ${pos.y + 2.2} ${pos.z}`);
      dialogo.setAttribute("value", "¡Estoy enfadado con Coraje!\n¡Buscalo y traemelo!");
      dialogo.setAttribute("visible", true);
      estado = "buscarCoraje";
    }
    else if (estado === "llevarAEustace") {
      dialogo.setAttribute("position", `${pos.x} ${pos.y + 2.2} ${pos.z}`);
      dialogo.setAttribute("value", "¡Gracias por encontrar a Coraje!\nAquí tienes la llave del portal.");
      dialogo.setAttribute("visible", true);
      llave.setAttribute("visible", true);
      estado = "llaveDisponible";
    }
  });

  // Click en Coraje
  coraje.addEventListener("click", () => {
    if (estado === "buscarCoraje" && !corajeCorre) {

      textoCoraje.setAttribute("position", "-8.808 1.75887 4.62225");
      textoCoraje.setAttribute("rotation", "0 88.833 0");
      textoCoraje.setAttribute("color", "red");
      textoCoraje.setAttribute("visible", true);

      coraje.setAttribute("position", "10.309 0.7 -15.25435");
      coraje.setAttribute("rotation", "0 -9.69 0");

      dialogo.setAttribute("value", "¡NOOOO! Coraje se ha escapado.\n¡Buscalo!");
      dialogo.setAttribute("visible", true);

      corajeCorre = true;
      estado = "corajeEscapado";
    }
    else if (estado === "corajeEscapado") {

      const posCoraje = coraje.getAttribute("position");

      coraje.setAttribute("visible", false);
      textoCoraje.setAttribute("visible", false);

      dialogo.setAttribute("position", `${posCoraje.x} ${posCoraje.y + 1.5} ${posCoraje.z}`);
      dialogo.setAttribute("value", "¡Has atrapado a Coraje!\nLlevaselo a Eustace.");
      dialogo.setAttribute("visible", true);

      estado = "llevarAEustace";
    }
  });

  // Click en la llave
  llave.addEventListener("click", () => {
    if (estado === "llaveDisponible") {
      portal.setAttribute("visible", true);
      llave.setAttribute("visible", false);
      dialogo.setAttribute("value", "¡El portal se ha abierto!");
    }
  });

  // CLICK EN EL PORTAL (NUEVO)
  portal.addEventListener("click", () => {
    if (estado === "llaveDisponible") {
      window.location.href = "RegularShow.html";
    }
  });

};
</script>

</body>
</html>
